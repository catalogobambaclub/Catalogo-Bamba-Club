<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Mayorista — BAMBA CLUB</title>
<style>
  :root{
    --bg:#ffffff; --card:#ffffff; --card2:#f4f4f4; --line:#e6e6e6;
    --txt:#0f0f0f; --muted:#8a8a8a; --accent:#0f0f0f; --accent-txt:#ffffff;
    --blue:#1a18e8; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:90px}
  a{color:inherit}

  /* ===== FLEJE / TICKER ===== */
  .ticker{background:var(--blue);overflow:hidden;white-space:nowrap;padding:9px 0;border-bottom:2px solid var(--blue)}
  .ticker-track{display:inline-block;white-space:nowrap;will-change:transform;animation:scroll 42s linear infinite}
  .ticker-track span{color:#fff;font-family:Arial,'Helvetica Neue',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ===== HEADER ===== */
  header{padding:30px 20px 18px;text-align:center;border-bottom:1px solid var(--line)}
  .logo-img{height:66px;width:auto;display:block;margin:0 auto}
  .brand{font-size:38px;font-weight:900;letter-spacing:6px;text-transform:uppercase;font-family:'Arial Black',Arial,sans-serif;color:var(--txt)}
  .cat-titulo{margin-top:12px;font-family:Arial,'Helvetica Neue',sans-serif;font-weight:800;font-size:15px;letter-spacing:2.5px;text-transform:uppercase;color:var(--txt)}
  .portada{width:100%;max-height:460px;object-fit:cover;display:block;border-bottom:1px solid var(--line)}

  /* ===== LAYOUT ===== */
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
  .controls{display:flex;gap:8px;justify-content:flex-end;margin:6px 6px 0}
  .controls button{background:transparent;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;color:var(--txt);letter-spacing:.5px}
  .controls button:hover{background:var(--card2)}
  .cat-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;
    margin:16px 6px 0;padding:14px 4px;border-bottom:2px solid var(--txt)}
  .cat-head .t{font-family:'Arial Black',Arial,sans-serif;font-size:16px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
  .cat-head .t small{color:var(--muted);font-weight:700;font-size:12px;margin-left:8px;letter-spacing:1px}
  .cat-head .chev{font-size:16px;transition:transform .2s ease;color:var(--muted)}
  .cat-head.open .chev{transform:rotate(180deg);color:var(--txt)}
  .cat-body{display:none}
  .cat-body.open{display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin:14px 0 6px}

  /* ===== CARD ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .18s ease, box-shadow .18s ease}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.09)}
  .ph{position:relative;aspect-ratio:3/4;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease}
  .card:hover .ph img{transform:scale(1.04)}
  .ph .noimg{color:#bbb;font-size:12px;letter-spacing:1px}
  .badge{position:absolute;top:8px;left:8px;background:var(--blue);color:#fff;font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 8px;border-radius:6px;text-transform:uppercase;z-index:2}
  .ph .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.85);border:1px solid var(--line);color:#0f0f0f;width:28px;height:28px;border-radius:50%;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:2}
  .ph .nav.prev{left:6px} .ph .nav.next{right:6px}
  .ph .nav:hover{background:#fff}
  .ph .dots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:4px;justify-content:center;z-index:2}
  .ph .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);display:inline-block}
  .ph .dots i.on{background:#fff;outline:1px solid rgba(0,0,0,.25)}
  .card-body{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1}
  .p-name{font-size:13px;font-weight:700;line-height:1.3}
  .p-price{font-size:18px;font-weight:800}
  .sizes{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
  .sz{border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:12px;cursor:pointer;background:var(--card2);user-select:none;transition:.15s}
  .sz.active{background:var(--accent);color:var(--accent-txt);border-color:var(--accent);font-weight:700}
  .add{margin-top:auto;background:var(--accent);color:var(--accent-txt);border:none;border-radius:10px;padding:10px;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:.5px}
  .add:active{transform:scale(.98)}

  /* ===== ORDER BAR ===== */
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -4px 16px rgba(0,0,0,.06);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:40}
  .bar .info{font-size:13px;color:var(--muted)}
  .bar .info b{color:var(--txt);font-size:15px}
  .bar button{background:var(--accent);color:var(--accent-txt);border:none;border-radius:10px;padding:11px 20px;font-weight:800;cursor:pointer}
  .bar button:disabled{opacity:.35;cursor:not-allowed}

  /* ===== MODAL ===== */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
  .modal.open{display:flex}
  .sheet{background:#fff;border:1px solid var(--line);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:20px}
  .sheet h2{font-family:'Arial Black',Arial,sans-serif;font-size:18px;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
  .line{display:flex;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .line small{color:var(--muted);display:block;font-size:12px}
  .line .rm{color:#d33;cursor:pointer;font-size:12px;border:none;background:none}
  .tot{display:flex;justify-content:space-between;padding:14px 0 4px;font-size:18px;font-weight:800}
  .form label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  .form input,.form textarea{width:100%;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--txt);font-size:14px;font-family:inherit}
  .actions{display:flex;gap:10px;margin-top:16px}
  .actions button{flex:1;padding:12px;border-radius:10px;font-weight:800;cursor:pointer;border:none}
  .btn-primary{background:var(--accent);color:var(--accent-txt)}
  .btn-ghost{background:transparent;color:var(--txt);border:1px solid var(--line) !important}
  .empty{color:var(--muted);text-align:center;padding:30px 0}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:26px 16px;letter-spacing:1px}
</style>
</head>
<body>

<!-- FLEJE EN MOVIMIENTO -->
<div class="ticker">
  <div class="ticker-track" id="ticker"></div>
</div>

<header>
  <img class="logo-img" id="logoImg" src="logo.png" alt="BAMBA CLUB" onerror="logoFallback(this)">
  <div class="brand" id="brandTxt" style="display:none">BAMBA</div>
  <div class="cat-titulo">Catálogo Mayorista</div>
</header>

<img class="portada" id="portada" src="portada.jpg" alt="" onerror="portadaFallback(this)">

<div class="wrap" id="catalogo">
  <p class="empty">Cargando catálogo…</p>
</div>

<footer>© BAMBA CLUB · Catálogo mayorista</footer>

<div class="bar">
  <div class="info"><span id="barCount">0</span> productos · <b id="barTotal">$0</b></div>
  <button id="verPedido" disabled onclick="abrirPedido()">Ver pedido</button>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h2>Tu pedido</h2>
    <div id="lineas"></div>
    <div class="tot"><span>Total</span><span id="modalTotal">$0</span></div>
    <div class="form">
      <label>Nombre / Empresa *</label>
      <input id="fNombre" placeholder="Tu nombre o local">
      <label>Teléfono / WhatsApp *</label>
      <input id="fTel" placeholder="Ej: 11 2345 6789">
      <label>Email</label>
      <input id="fMail" placeholder="opcional">
      <label>Notas (opcional)</label>
      <textarea id="fNotas" rows="2" placeholder="Comentarios del pedido"></textarea>
    </div>
    <div class="actions">
      <button class="btn-ghost" onclick="cerrarPedido()">Seguir comprando</button>
      <button class="btn-primary" onclick="descargarPlanilla()">Descargar pedido (Excel)</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   CATÁLOGO MAYORISTA — BAMBA CLUB
   Productos: se cargan desde "productos.csv".
   ========================================================= */

/* --- Fleje en movimiento --- */
const MENSAJE = "BAMBA CLUB – OWN THE $TREET$ – OUTSIDERS      COMPRA MAYORISTA 300 MIL, SÓLO LOCAL FÍSICO | SHOWROOM      ";
(function(){
  let html="";
  for(let i=0;i<8;i++){ html += "<span>"+MENSAJE+"</span>"; }
  document.getElementById("ticker").innerHTML = html;
})();

/* --- Logo y portada: prueba varios nombres/mayúsculas --- */
const LOGO_TRIES = ["logo.png","Logo.png","LOGO.png","logo.PNG","Logo.PNG"];
let logoIdx = 0;
function logoFallback(img){
  logoIdx++;
  if(logoIdx < LOGO_TRIES.length){ img.src = LOGO_TRIES[logoIdx]; }
  else{ img.style.display="none"; document.getElementById("brandTxt").style.display="block"; }
}
const PORT_TRIES = ["portada.jpg","portada.png","portada.jpeg","Portada.jpg","Portada.png","portada.PNG","portada.JPG"];
let portIdx = 0;
function portadaFallback(img){
  portIdx++;
  if(portIdx < PORT_TRIES.length){ img.src = PORT_TRIES[portIdx]; }
  else{ img.style.display="none"; }
}

const EJEMPLO = [
  {categoria:"REMERA BOXY", producto:"REMERA BOXY SHIELD", color:"Rojo", etiqueta:"NEW IN", precio:14990, talles:"S,M,L,XL,XXL", imagen:""},
  {categoria:"CAMPERA ZIP", producto:"CAMPERA SERIF", color:"Negro", etiqueta:"NEW IN", precio:42990, talles:"S,M,L,XL", imagen:""},
  {categoria:"JEANS", producto:"JEAN BAGGY OXID", color:"Celeste", etiqueta:"", precio:34990, talles:"38,40,42,44", imagen:""},
];

let PRODUCTOS = [];
const pedido = [];
const IMGS = {};      // fotos por producto (para el carrusel)
const idxMap = {};    // foto actual mostrada por producto
const money = n => "$" + Number(n).toLocaleString("es-AR");

function slide(e, gi, dir){
  e.stopPropagation();
  const imgs = IMGS[gi]; if(!imgs || imgs.length < 2) return;
  let i = ((idxMap[gi]||0) + dir + imgs.length) % imgs.length;
  idxMap[gi] = i;
  const im = document.getElementById("img"+gi);
  if(im){ im.style.display="block"; im.src = imgs[i]; }
  const dots = document.getElementById("dots"+gi);
  if(dots) dots.querySelectorAll("i").forEach((d,k)=>d.classList.toggle("on", k===i));
}
function imgErr(el){
  const ph = el.parentNode; el.remove();
  if(!ph.querySelector(".noimg")) ph.insertAdjacentHTML("afterbegin",'<span class="noimg">SIN FOTO</span>');
}

async function cargar(){
  try{
    const r = await fetch("productos.csv", {cache:"no-store"});
    if(!r.ok) throw 0;
    const txt = await r.text();
    PRODUCTOS = parseCSV(txt);
    if(!PRODUCTOS.length) throw 0;
  }catch(e){ PRODUCTOS = EJEMPLO; }
  render();
}

function parseCSV(txt){
  const rows = [];
  const lines = txt.replace(/\r/g,"").split("\n").filter(l=>l.trim()!=="");
  if(!lines.length) return rows;
  const headers = splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  for(let i=1;i<lines.length;i++){
    const cells = splitLine(lines[i]);
    const o = {};
    headers.forEach((h,idx)=> o[h] = (cells[idx]||"").trim());
    if(o.producto) rows.push({
      categoria:(o.categoria||"OTROS").toUpperCase(),
      producto:o.producto, color:o.color||"", etiqueta:o.etiqueta||"",
      precio:Number(String(o.precio).replace(/[^0-9]/g,""))||0,
      talles:o.talles||"", imagen:o.imagen||""
    });
  }
  return rows;
}
function splitLine(line){
  const out=[];let cur="";let q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(c==='"'){q=!q;} else if(c===',' && !q){out.push(cur);cur="";} else cur+=c;}
  out.push(cur);return out;
}

function render(){
  const cont = document.getElementById("catalogo");
  const cats = [...new Set(PRODUCTOS.map(p=>p.categoria))];
  if(!cats.length){ cont.innerHTML = `<p class="empty">No hay productos cargados.</p>`; return; }
  let html = `<div class="controls">
      <button onclick="toggleAll(true)">Abrir todo</button>
      <button onclick="toggleAll(false)">Cerrar todo</button>
    </div>`;
  cats.forEach(cat=>{
    const items = PRODUCTOS.filter(p=>p.categoria===cat);
    html += `<div class="cat-head" onclick="toggleCat(this)">
        <span class="t">${cat}<small>(${items.length})</small></span>
        <span class="chev">▾</span>
      </div>
      <div class="cat-body"><div class="grid">`;
    items.forEach((p)=>{
      const gi = PRODUCTOS.indexOf(p);
      const talles = p.talles.split(",").map(t=>t.trim()).filter(Boolean);
      const imgs = p.imagen.split("|").map(s=>s.trim()).filter(Boolean);
      IMGS[gi] = imgs; idxMap[gi] = 0;
      let phInner;
      if(imgs.length){
        phInner = `<img id="img${gi}" src="${imgs[0]}" alt="${p.producto}" onerror="imgErr(this)">`;
        if(imgs.length > 1){
          phInner += `<button class="nav prev" onclick="slide(event,${gi},-1)" aria-label="Anterior">‹</button>
                      <button class="nav next" onclick="slide(event,${gi},1)" aria-label="Siguiente">›</button>
                      <span class="dots" id="dots${gi}">${imgs.map((_,k)=>`<i class="${k===0?'on':''}"></i>`).join("")}</span>`;
        }
      } else { phInner = `<span class="noimg">SIN FOTO</span>`; }
      html += `
      <div class="card" data-i="${gi}">
        <div class="ph">${phInner}${p.etiqueta?`<span class="badge">${p.etiqueta}</span>`:""}</div>
        <div class="card-body">
          <div class="p-name">${p.producto}${p.color?` · ${p.color}`:""}</div>
          <div class="p-price">${money(p.precio)}</div>
          <div class="sizes">${talles.map(t=>`<span class="sz" onclick="pickSize(this)">${t}</span>`).join("")||'<span class="noimg">Talle único</span>'}</div>
          <button class="add" onclick="add(${gi},this)">+ Agregar al pedido</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  cont.innerHTML = html;
}

function toggleCat(head){
  head.classList.toggle("open");
  head.nextElementSibling.classList.toggle("open");
}
function toggleAll(open){
  document.querySelectorAll(".cat-head").forEach(h=>h.classList.toggle("open", open));
  document.querySelectorAll(".cat-body").forEach(b=>b.classList.toggle("open", open));
}

function pickSize(el){
  el.parentNode.querySelectorAll(".sz").forEach(s=>s.classList.remove("active"));
  el.classList.add("active");
}

function add(i, btn){
  const card = btn.closest(".card");
  const active = card.querySelector(".sz.active");
  const talles = card.querySelectorAll(".sz");
  let talle = "Único";
  if(talles.length){
    if(!active){ alert("Elegí un talle 👕"); return; }
    talle = active.textContent;
  }
  const p = PRODUCTOS[i];
  const key = i+"|"+talle;
  const found = pedido.find(x=>x.key===key);
  if(found) found.cant++;
  else pedido.push({key, nombre:p.producto, color:p.color, talle, precio:p.precio, cant:1});
  actualizarBarra();
  btn.textContent = "✓ Agregado";
  setTimeout(()=>btn.textContent="+ Agregar al pedido", 900);
}

function actualizarBarra(){
  const cant = pedido.reduce((s,x)=>s+x.cant,0);
  const tot = pedido.reduce((s,x)=>s+x.cant*x.precio,0);
  document.getElementById("barCount").textContent = cant;
  document.getElementById("barTotal").textContent = money(tot);
  document.getElementById("verPedido").disabled = cant===0;
}

function abrirPedido(){ renderLineas(); document.getElementById("modal").classList.add("open"); }
function cerrarPedido(){ document.getElementById("modal").classList.remove("open"); }

function renderLineas(){
  const cont = document.getElementById("lineas");
  if(!pedido.length){ cont.innerHTML = `<p class="empty">Tu pedido está vacío.</p>`; }
  else{
    cont.innerHTML = pedido.map((x,idx)=>`
      <div class="line">
        <div>${x.nombre}${x.color?` · ${x.color}`:""}
          <small>Talle ${x.talle} · ${money(x.precio)} c/u</small>
        </div>
        <div style="text-align:right;white-space:nowrap">
          x${x.cant} · <b>${money(x.precio*x.cant)}</b><br>
          <button class="rm" onclick="quitar(${idx})">quitar</button>
        </div>
      </div>`).join("");
  }
  const tot = pedido.reduce((s,x)=>s+x.cant*x.precio,0);
  document.getElementById("modalTotal").textContent = money(tot);
}
function quitar(idx){ pedido.splice(idx,1); actualizarBarra(); renderLineas(); }

function descargarPlanilla(){
  const nombre = document.getElementById("fNombre").value.trim();
  const tel = document.getElementById("fTel").value.trim();
  if(!pedido.length){ alert("Tu pedido está vacío."); return; }
  if(!nombre || !tel){ alert("Completá Nombre y Teléfono."); return; }
  const mail = document.getElementById("fMail").value.trim();
  const notas = document.getElementById("fNotas").value.trim().replace(/\n/g," ");
  const fecha = new Date().toLocaleString("es-AR");

  let csv = "PEDIDO MAYORISTA - BAMBA CLUB\n";
  csv += `Fecha,${fecha}\n`;
  csv += `Cliente,${esc(nombre)}\n`;
  csv += `Telefono,${esc(tel)}\n`;
  csv += `Email,${esc(mail)}\n`;
  csv += `Notas,${esc(notas)}\n\n`;
  csv += "Producto,Color,Talle,Cantidad,Precio unit,Subtotal\n";
  let tot=0;
  pedido.forEach(x=>{
    const sub=x.precio*x.cant; tot+=sub;
    csv += `${esc(x.nombre)},${esc(x.color)},${x.talle},${x.cant},${x.precio},${sub}\n`;
  });
  csv += `,,,,TOTAL,${tot}\n`;

  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safe = nombre.replace(/[^a-z0-9]/gi,"_");
  a.href=url; a.download=`Pedido_${safe}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  alert("✓ ¡Listo! Se descargó la planilla de tu pedido. Envíanosla para confirmarlo.");
}
function esc(s){ s=String(s||""); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }

cargar();
</script>
</body>
</html>
